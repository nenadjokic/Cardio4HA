mark_as_maintenance:
  description: Mark a device as under maintenance (temporarily ignore issues)
  fields:
    device_key:
      description: Device key (device ID or entity ID) to mark as maintenance
      required: true
      example: abc123def456
      selector:
        text:
    duration:
      description: Duration in seconds
      required: false
      default: 3600
      example: 3600
      selector:
        number:
          min: 60
          max: 86400
          unit_of_measurement: seconds
    name:
      description: Optional friendly name of the device
      required: false
      example: "Living Room Sensor"
      selector:
        text:

clear_history:
  description: Clear unavailable tracking history
  fields:
    entity_id:
      description: Optional specific entity to clear, or all if omitted
      required: false
      example: "sensor.living_room_motion"
      selector:
        entity:
          multiple: false

force_scan:
  description: Force an immediate device scan

clear_device_history:
  description: Clear device event history (timeline, battery readings, signal readings)
  fields:
    device_key:
      description: Optional device key to clear history for, or all if omitted
      required: false
      example: abc123def456
      selector:
        text:

set_ignore:
  description: Permanently ignore a device from all monitoring views
  fields:
    device_key:
      description: Device key to ignore
      required: true
      example: abc123def456
      selector:
        text:
    name:
      description: Optional friendly name of the device
      required: false
      example: "Living Room Sensor"
      selector:
        text:

clear_ignore:
  description: Clear ignore status for a device or all ignored devices
  fields:
    device_key:
      description: Optional device key to un-ignore, or all if omitted
      required: false
      example: abc123def456
      selector:
        text:
